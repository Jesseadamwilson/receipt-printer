type: vertical-stack
cards:
  - type: entities
    title: Receipt Printer
    entities:
      - input_text.receipt_message
      - input_text.receipt_notes

  - type: entities
    title: Daily Agenda Includes
    entities:
      - input_boolean.receipt_agenda_include_header
      - input_boolean.receipt_agenda_include_weather
      - input_boolean.receipt_agenda_include_sleep
      - input_boolean.receipt_agenda_include_events
      - input_boolean.receipt_agenda_include_alerts
      - input_boolean.receipt_agenda_include_notes
      - input_boolean.receipt_agenda_include_footer

  - type: horizontal-stack
    cards:
      - type: button
        name: Print Message
        icon: mdi:printer
        tap_action:
          action: call-service
          service: script.receipt_print_message
      - type: button
        name: Print Daily Agenda
        icon: mdi:calendar
        tap_action:
          action: call-service
          service: script.receipt_print_daily_agenda
