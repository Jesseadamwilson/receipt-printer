<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      :root {
        --paper-width: 576px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: var(--paper-width);
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111;
        background: #fff;
      }
      .ticket {
        padding: 20px 22px 18px;
      }
      .header {
        border-bottom: 2px solid #111;
        padding-bottom: 12px;
        margin-bottom: 14px;
      }
      .header h1 {
        margin: 0;
        font-size: 38px;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      .content {
        min-height: 180px;
      }
      .line {
        font-size: 26px;
        line-height: 1.3;
        margin: 0 0 10px;
      }
      .footer {
        border-top: 2px solid #111;
        margin-top: 14px;
        padding-top: 10px;
        font-size: 20px;
      }
    </style>
    {{custom_css_block}}
  </head>
  <body>
    <section class="ticket">
      <img src="assets/logo-filled.svg">
      {{header_html}}
      <main class="content">
        {{content_html}}
      </main>
      {{footer_html}}
    </section>
  </body>
</html>
