<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Receipt Printer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>Receipt Printer Service</h1>
      <p>Preview or print using zone-based templates with dynamic payload fields.</p>

      <section>
        <h2>Message</h2>
        <form id="message-form">
          <label>
            Headline
            <input name="headline" type="text" value="Home Note" />
          </label>

          <label>
            Message
            <textarea name="message" rows="4" required>Reminder: water the plants tonight.</textarea>
          </label>

          <label>
            Footer
            <input name="footer" type="text" value="- Jesse" />
          </label>

          <div class="row">
            <label class="checkbox">
              <input name="include_header" type="checkbox" checked />
              Header zone
            </label>
            <label class="checkbox">
              <input name="include_content" type="checkbox" checked />
              Content zone
            </label>
            <label class="checkbox">
              <input name="include_footer" type="checkbox" checked />
              Footer zone
            </label>
          </div>

          <div class="row">
            <label>
              Header size px
              <input name="theme_header_size_px" type="number" min="12" max="120" value="42" />
            </label>
            <label>
              Content size px
              <input name="theme_content_size_px" type="number" min="10" max="96" value="30" />
            </label>
            <label>
              Footer size px
              <input name="theme_footer_size_px" type="number" min="8" max="80" value="18" />
            </label>
          </div>

          <div class="row">
            <label>
              Threshold
              <input name="threshold" type="number" min="1" max="255" value="180" />
            </label>

            <label>
              Feed lines
              <input name="feed_lines" type="number" min="0" max="12" value="3" />
            </label>

            <label class="checkbox">
              <input name="cut" type="checkbox" checked />
              Cut paper
            </label>
          </div>

          <div class="buttons">
            <button type="button" data-action="preview-message">Preview</button>
            <button type="button" data-action="print-message">Print</button>
          </div>
        </form>
      </section>

      <section>
        <h2>Daily Agenda</h2>
        <form id="agenda-form">
          <label>
            Title
            <input name="title" type="text" value="Daily Agenda" />
          </label>

          <label>
            Subtitle
            <input name="subtitle" type="text" value="Today" />
          </label>

          <label>
            Weather Summary
            <input name="weather_summary" type="text" value="Cloudy" />
          </label>

          <div class="row">
            <label>
              Temp
              <input name="weather_temp" type="text" value="64°F" />
            </label>
            <label>
              High
              <input name="weather_high" type="text" value="68°F" />
            </label>
            <label>
              Low
              <input name="weather_low" type="text" value="54°F" />
            </label>
          </div>

          <label>
            Sleep Hours
            <input name="sleep_hours" type="text" value="7.3" />
          </label>

          <label>
            Events (one per line: `time | title | location`)
            <textarea name="events" rows="4">08:30 | Standup | Office
13:00 | Product Review | Zoom</textarea>
          </label>

          <label>
            Alerts (one per line)
            <textarea name="alerts" rows="3">Litter box ready for cleaning
Roborock finished kitchen</textarea>
          </label>

          <label>
            Notes
            <textarea name="notes" rows="3">Take dog to vet at 4:30 PM.</textarea>
          </label>

          <div class="row">
            <label class="checkbox">
              <input name="include_header" type="checkbox" checked />
              Header zone
            </label>
            <label class="checkbox">
              <input name="include_weather" type="checkbox" checked />
              Weather
            </label>
            <label class="checkbox">
              <input name="include_sleep" type="checkbox" checked />
              Sleep
            </label>
            <label class="checkbox">
              <input name="include_events" type="checkbox" checked />
              Events
            </label>
            <label class="checkbox">
              <input name="include_alerts" type="checkbox" checked />
              Alerts
            </label>
            <label class="checkbox">
              <input name="include_notes" type="checkbox" checked />
              Notes
            </label>
            <label class="checkbox">
              <input name="include_footer" type="checkbox" checked />
              Footer zone
            </label>
          </div>

          <div class="row">
            <label>
              Header size px
              <input name="theme_header_size_px" type="number" min="12" max="120" value="38" />
            </label>
            <label>
              Content size px
              <input name="theme_content_size_px" type="number" min="10" max="96" value="22" />
            </label>
            <label>
              Footer size px
              <input name="theme_footer_size_px" type="number" min="8" max="80" value="16" />
            </label>
          </div>

          <div class="buttons">
            <button type="button" data-action="preview-agenda">Preview</button>
            <button type="button" data-action="print-agenda">Print</button>
          </div>
        </form>
      </section>

      <section>
        <h2>Preview</h2>
        <img id="preview" alt="Receipt preview" />
      </section>

      <section>
        <h2>Response</h2>
        <pre id="response"></pre>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
