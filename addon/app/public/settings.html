<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Receipt Printer Settings</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <main class="page">
    <section class="ha-card page-card">
      <header class="page-header">
        <div>
          <h1>Receipt Printer</h1>
          <p class="secondary">Daily agenda + message settings with template preview.</p>
        </div>
        <div class="header-actions">
          <button id="reload-btn" class="btn">Reload</button>
          <button id="save-btn" class="btn btn-primary">Save All</button>
        </div>
      </header>

      <section class="layout">
        <section class="ha-card card">
          <header class="card-header">
            <div>
              <h2>Daily Agenda</h2>
              <p class="secondary">Use entity IDs and reorder sections with arrows.</p>
            </div>
            <button id="add-item-btn" class="btn">Add Row</button>
          </header>
          <div id="item-list" class="item-list"></div>
        </section>

        <section class="ha-card card">
          <header class="card-header">
            <h2>Message Template</h2>
          </header>

          <label class="field">
            <span>Message Headline</span>
            <input id="message-headline" type="text" placeholder="Message">
          </label>

          <label class="field">
            <span>Message Body (emoji supported)</span>
            <textarea id="message-body" rows="10" placeholder="Type the message to print..."></textarea>
          </label>
        </section>

        <section class="ha-card card card-full">
          <header class="card-header">
            <h2>Template CSS + Preview</h2>
          </header>

          <label class="field">
            <span>Custom CSS (applies to receipt template rendering)</span>
            <textarea id="custom-css" rows="12" placeholder="/* custom receipt css */"></textarea>
          </label>

          <div class="preview-actions">
            <button id="preview-daily-btn" class="btn">Preview Daily Agenda</button>
            <button id="print-daily-btn" class="btn">Print Daily Agenda</button>
            <button id="preview-message-btn" class="btn">Preview Message</button>
            <button id="print-message-btn" class="btn">Print Message</button>
          </div>

          <div class="preview-frame">
            <img id="preview-image" alt="Template preview" hidden>
            <p id="preview-empty" class="secondary">No preview generated yet.</p>
          </div>
        </section>
      </section>
    </section>
  </main>

  <div id="status-bar" class="status-bar" data-kind="info">Loading settings...</div>
  <script src="settings.js"></script>
</body>
</html>
