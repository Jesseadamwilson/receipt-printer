<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      :root {
        --paper-width: 576px;
        --ink: #000;
        --paper: #fff;
        --muted: #c7c7c7;
      }

      @font-face {
        font-family: "HelveticaNeueHeadline";
        src: url("assets/fonts/helvetica-neue/HelveticaNeueLTStd-BlkExO.otf") format("opentype");
      }

      @font-face {
        font-family: "GothamBold";
        src: url("assets/fonts/gotham/Gotham-Bold.otf") format("opentype");
      }

      @font-face {
        font-family: "GothamMedium";
        src: url("assets/fonts/gotham/Gotham-Medium.otf") format("opentype");
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: var(--paper-width);
        background: var(--paper);
        color: var(--ink);
        font-family: "GothamMedium", ui-sans-serif, system-ui, -apple-system, sans-serif;
        font-size: 24px;
      }

      .ticket {
        padding: 10px;
      }

      .brand-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
      }

      .brand-logo {
        width: 164px;
        height: auto;
      }

      .brand-ornament {
        width: 58px;
        height: auto;
      }

      .summary-date {
        margin-top: 25px;
        border: 2px solid var(--ink);
        border-radius: 999px;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 48px;
        background: var(--ink);
      }
      .summary-date-label {
        text-transform: uppercase;
        letter-spacing: 0.5px;
        line-height: 1;
        transform: translateY(15%);
        white-space: nowrap;
        color: var(--paper);
        font-family: "HelveticaNeueHeadline", "GothamBold", sans-serif;
        font-size: 30px;
        border-radius: 999px;
      }

      .section--sleep {
        margin-top: 16px;
      }

      .section-divider {
        border: 0;
        border-top: 2px solid var(--ink);
        margin: 20px 0;
      }

      .metric-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .metric-left {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 188px;
      }

      .metric-icon {
        width: 40px;
        max-width: 40px;
        max-height: 40px;
        height: 40px;
        object-fit: contain;
      }

      .metric-label {
        font-family: "HelveticaNeueHeadline", "GothamBold", sans-serif;
        font-size: 22px;
        transform: translateY(25%);
        line-height: 1;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        white-space: nowrap;
      }

      .metric-value {
        font-family: "GothamMedium", sans-serif;
        text-align: right;
      }

      .devices-wrap {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .device-gauge {
        width: 75px;
        height: 75px;
        position: relative;
      }

      .device-gauge-svg {
        width: 75px;
        height: 75px;
        display: block;
      }

      .device-gauge-outline-ring,
      .device-gauge-track-ring,
      .device-gauge-progress-ring {
        fill: none;
      }

      .device-gauge-outline-ring {
        stroke: var(--ink);
        stroke-width: 10px;
      }

      .device-gauge-track-ring {
        stroke: var(--paper);
        stroke-width: 7px;
      }

      .device-gauge-progress-ring {
        stroke: var(--ink);
        stroke-width: 7px;
        stroke-linecap: butt;
        transform: rotate(-90deg);
        transform-origin: 32px 32px;
      }

      .device-gauge-core {
        position: absolute;
        inset: 9px;
        border-radius: 50%;
        background: var(--paper);
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid var(--ink);
      }

      .device-gauge-icon {
        width: 35px;
        height: 35px;
        object-fit: contain;
      }

      .list-section {
        margin-top: 2px;
      }

      .leader-row {
        display: grid;
        grid-template-columns: max-content 1fr minmax(0, 56%);
        align-items: start;
        column-gap: 8px;
        margin: 8px 0;
      }

      .leader-left {
        font-family: "GothamBold", sans-serif;
        font-size: 19px;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .leader-dots {
        width: 100%;
        height: 0;
        border-bottom: 2px dotted var(--ink);
        min-width: 20px;
        margin-top: 14px;
      }

      .leader-right {
        font-family: "GothamMedium", sans-serif;
        font-size: 19px;
        text-align: right;
        min-width: 0;
        line-height: 1.14;
        overflow-wrap: anywhere;
      }

      .calendar-entry {
        display: grid;
        grid-template-columns: max-content 1fr max-content;
        align-items: start;
        column-gap: 8px;
        row-gap: 2px;
        margin: 8px 0;
      }

      .calendar-entry .leader-dots {
        margin-top: 14px;
      }

      .calendar-entry .leader-right {
        max-width: 360px;
      }

      .calendar-entry .leader-right-first {
        white-space: nowrap;
      }

      .calendar-entry-more {
        grid-column: 3;
        text-align: right;
      }

      .calendar-gantt {
        margin-top: 18px;
      }

      .calendar-gantt-rows {
        display: grid;
        gap: 4px;
      }

      .calendar-gantt-row {
        margin: 0;
        padding: 0;
      }

      .calendar-gantt-track {
        position: relative;
        height: 10px;
        overflow: hidden;
        border: 1.5px solid var(--ink);
        border-radius: 999px;
        background: var(--paper);
      }

      .calendar-gantt-bar {
        position: absolute;
        top: 0;
        bottom: 0;
        background: var(--ink);
        border-radius: 999px;
      }

      .calendar-gantt-hours {
        position: relative;
        height: 34px;
        margin-top: 8px;
      }

      .calendar-gantt-hour-marker {
        position: absolute;
        top: 0;
        transform: translateX(-50%);
        width: 0;
      }

      .calendar-gantt-hour-tick {
        display: block;
        width: 0;
        height: 7px;
        border-left: 1px solid var(--ink);
      }

      .calendar-gantt-hour-label {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        gap: 1px;
        margin-top: 4px;
        transform: translateX(-50%);
      }

      .calendar-gantt-hour-major {
        font-family: "GothamMedium", sans-serif;
        font-size: 13px;
        line-height: 1;
        white-space: nowrap;
      }

      .calendar-gantt-hour-meridiem {
        font-family: "GothamMedium", sans-serif;
        font-size: 9px;
        line-height: 1;
        letter-spacing: 0.4px;
        white-space: nowrap;
      }

      .notification-row .leader-left {
        letter-spacing: 1px;
      }

      .is-hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <section class="ticket ticket--daily-agenda">
      <header class="brand-row">
        <img class="brand-logo" src="assets/logo-filled.svg" alt="Brand">
        <img class="brand-ornament" src="assets/ornament.svg" alt="">
      </header>

      <section class="summary-date">
          <div class="summary-date-label">{{date_chip}}</div>
      </section>

      <section class="metric-row section--sleep">
        <div class="metric-left">
          <img class="metric-icon" src="assets/sleep-svgrepo-com.svg" alt="">
          <h2 class="metric-label">Sleep</h2>
        </div>
        <p class="metric-value">{{sleep_line}}</p>
      </section>

      <hr class="section-divider">

      <section class="metric-row section--weather">
        <div class="metric-left">
          <img class="metric-icon" src="assets/weather-icon.svg" alt="">
          <h2 class="metric-label">Weather</h2>
        </div>
        <p class="metric-value">{{weather_line}}</p>
      </section>

      <hr class="section-divider">

      <section class="metric-row section--devices">
        <div class="metric-left">
          <img class="metric-icon" src="assets/power-icon.svg" alt="">
          <h2 class="metric-label">Devices</h2>
        </div>
        <div class="devices-wrap">
          {{{device_battery_items_html}}}
        </div>
      </section>

      <hr class="section-divider">

      <section class="list-section section--calendar">
        <div class="metric-left">
          <img class="metric-icon" src="assets/calendar-icon.svg" alt="">
          <h2 class="metric-label">Calendar</h2>
        </div>
        {{{calendar_rows_html}}}
        <section class="calendar-gantt {{calendar_gantt_hidden_class}}">
          <div class="calendar-gantt-rows">
            {{{calendar_gantt_rows_html}}}
          </div>
          <div class="calendar-gantt-hours">
            {{{calendar_gantt_hour_markers_html}}}
          </div>
        </section>
      </section>

      <hr class="section-divider {{notifications_divider_hidden_class}}">

      <section class="list-section section--notifications {{notifications_hidden_class}}">
        <div class="metric-left">
          <img class="metric-icon" src="assets/bell-svgrepo-com.svg" alt="">
          <h2 class="metric-label">Notifications</h2>
        </div>
        {{{notification_rows_html}}}
      </section>
    </section>
  </body>
</html>
