<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      :root {
        --paper-width: 576px;
        --ink: #000;
        --paper: #fff;
        --muted: #c7c7c7;
      }

      @font-face {
        font-family: "HelveticaNeueHeadline";
        src: url("assets/fonts/helvetica-neue/HelveticaNeueLTStd-BlkExO.otf") format("opentype");
      }

      @font-face {
        font-family: "GothamBold";
        src: url("assets/fonts/gotham/Gotham-Bold.otf") format("opentype");
      }

      @font-face {
        font-family: "GothamMedium";
        src: url("assets/fonts/gotham/Gotham-Medium.otf") format("opentype");
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: var(--paper-width);
        background: var(--paper);
        color: var(--ink);
        font-family: "GothamMedium", ui-sans-serif, system-ui, -apple-system, sans-serif;
      }

      .ticket {
        padding: 28px 30px 30px;
      }

      .brand-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
      }

      .brand-logo {
        width: 164px;
        height: auto;
      }

      .brand-ornament {
        width: 58px;
        height: auto;
      }

      .summary-chip {
        margin-top: 18px;
        border: 2px solid var(--ink);
        border-radius: 999px;
        overflow: hidden;
        display: grid;
        grid-template-columns: 1.7fr 1fr;
      }

      .summary-chip-left,
      .summary-chip-right {
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }

      .summary-chip-left {
        background: var(--ink);
        color: var(--paper);
        font-family: "HelveticaNeueHeadline", "GothamBold", sans-serif;
        font-size: 22px;
      }

      .summary-chip-right {
        color: var(--ink);
        font-family: "HelveticaNeueHeadline", "GothamBold", sans-serif;
        font-size: 22px;
      }

      .section-divider {
        border: 0;
        border-top: 2px solid var(--ink);
        margin: 20px 0;
      }

      .metric-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .metric-left {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 188px;
      }

      .metric-icon {
        width: 44px;
        height: 44px;
        object-fit: contain;
      }

      .metric-label {
        font-family: "HelveticaNeueHeadline", "GothamBold", sans-serif;
        font-size: 18px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        white-space: nowrap;
      }

      .metric-value {
        font-family: "GothamMedium", sans-serif;
        font-size: 19px;
        text-align: right;
      }

      .devices-wrap {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .device-gauge {
        width: 62px;
        height: 62px;
        position: relative;
        --battery-level: 0;
      }

      .device-gauge-track,
      .device-gauge-fill {
        position: absolute;
        inset: 0;
        border-radius: 50%;
      }

      .device-gauge-track {
        background: conic-gradient(var(--muted) 100%, var(--muted) 0);
      }

      .device-gauge-fill {
        background: conic-gradient(var(--ink) calc(var(--battery-level) * 1%), transparent 0);
        transform: rotate(-90deg);
      }

      .device-gauge-core {
        position: absolute;
        inset: 7px;
        border-radius: 50%;
        background: var(--paper);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .device-gauge-icon {
        width: 30px;
        height: 30px;
        object-fit: contain;
      }

      .list-section {
        margin-top: 2px;
      }

      .leader-row {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin: 8px 0;
      }

      .leader-left {
        font-family: "GothamBold", sans-serif;
        font-size: 17px;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .leader-dots {
        flex: 1 1 auto;
        border-bottom: 2px dotted var(--ink);
        transform: translateY(-2px);
        min-width: 12px;
      }

      .leader-right {
        font-family: "GothamMedium", sans-serif;
        font-size: 17px;
        text-align: right;
      }

      .notification-row .leader-left {
        letter-spacing: 1px;
      }
    </style>
    {{custom_css_block}}
  </head>
  <body>
    <section class="ticket ticket--daily-agenda">
      <header class="brand-row">
        <img class="brand-logo" src="assets/logo-filled.svg" alt="Brand">
        <img class="brand-ornament" src="assets/ornament.svg" alt="">
      </header>

      <section class="summary-chip">
        <div class="summary-chip-left">{{date_chip}}</div>
        <div class="summary-chip-right">{{summary_label}}</div>
      </section>

      <section class="metric-row section--sleep">
        <div class="metric-left">
          <img class="metric-icon" src="assets/sleep-svgrepo-com.svg" alt="">
          <h2 class="metric-label">Sleep</h2>
        </div>
        <p class="metric-value">{{sleep_line}}</p>
      </section>

      <hr class="section-divider">

      <section class="metric-row section--weather">
        <div class="metric-left">
          <img class="metric-icon" src="assets/weather-icon.svg" alt="">
          <h2 class="metric-label">Weather</h2>
        </div>
        <p class="metric-value">{{weather_line}}</p>
      </section>

      <hr class="section-divider">

      <section class="metric-row section--devices">
        <div class="metric-left">
          <img class="metric-icon" src="assets/power-icon.svg" alt="">
          <h2 class="metric-label">Devices</h2>
        </div>
        <div class="devices-wrap">
          {{{device_battery_items_html}}}
        </div>
      </section>

      <hr class="section-divider">

      <section class="list-section section--calendar">
        <div class="metric-left">
          <img class="metric-icon" src="assets/calendar-icon.svg" alt="">
          <h2 class="metric-label">Calendar</h2>
        </div>
        {{{calendar_rows_html}}}
      </section>

      <hr class="section-divider">

      <section class="list-section section--notifications">
        <div class="metric-left">
          <img class="metric-icon" src="assets/bell-svgrepo-com.svg" alt="">
          <h2 class="metric-label">Notifications</h2>
        </div>
        {{{notification_rows_html}}}
      </section>
    </section>
  </body>
</html>
