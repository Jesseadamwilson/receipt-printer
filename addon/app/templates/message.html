<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      :root {
        --paper-width: 576px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: var(--paper-width);
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111;
        background: #fff;
      }
      .ticket {
        padding: 20px 22px 18px;
      }
      .header {
        border-bottom: 2px solid #111;
        padding-bottom: 10px;
        margin-bottom: 14px;
      }
      .headline {
        margin: 0;
        font-size: 34px;
        letter-spacing: 0.6px;
        text-transform: uppercase;
      }
      .meta {
        margin: 6px 0 0;
        font-size: 20px;
      }
      .content {
        min-height: 180px;
      }
      .message-lines .message-line {
        margin: 0 0 10px;
        font-size: 28px;
        line-height: 1.3;
      }
      .footer {
        border-top: 2px solid #111;
        margin-top: 14px;
        padding-top: 10px;
        font-size: 20px;
      }
    </style>
    {{custom_css_block}}
  </head>
  <body>
    <section class="ticket ticket--message">
      <header class="header">
        <h1 class="headline">{{headline}}</h1>
        <p class="meta">{{day_of_week}}, {{date}} {{time}}</p>
      </header>
      <main class="content">
        <section class="message-lines">
          {{{message_lines_html}}}
        </section>
      </main>
      <footer class="footer">Printed: {{printed_at}}</footer>
    </section>
  </body>
</html>
